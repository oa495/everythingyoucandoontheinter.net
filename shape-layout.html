<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shape Layout</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* overflow: hidden prevents scrollbars from appearing when elements
   are positioned near the edges of the screen */
body { overflow: hidden; }

/* The stage fills the entire browser window.
   100vw = 100% of the viewport width, 100vh = 100% of the viewport height.
   position: relative is needed so absolutely-positioned children
   are placed relative to this div, not the whole page. */
#stage {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* The SVG guide draws the dashed shape outline behind the text blocks.
   pointer-events: none means you can't click on it — clicks pass through
   to the text blocks underneath. */
#guide {
  position: absolute;
  inset: 0; /* shorthand for top:0; right:0; bottom:0; left:0 — fills the stage */
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* Each text block is positioned absolutely, meaning it's placed at exact
   pixel coordinates set by JavaScript (left: and top:).
   transform: translate(-50%, -50%) shifts the block so its CENTER sits
   at those coordinates, rather than its top-left corner. */
.block {
  position: absolute;
  transform: translate(-50%, -50%);
  outline: none;     /* removes the focus ring when you click to edit */
  text-align: center;
  max-width: 180px;
  cursor: text;
}

  .playground-link {
    position: fixed;
    top: 1rem;
    right: 1rem;
    font-family: "Garamond", serif;
    font-size: 1rem;
    background: white;
    padding: 0.5rem;
    border: 1px solid black;
  }

/* The shape selector dropdown, pinned to the bottom center of the screen */
#controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%); /* centers the controls horizontally */
}
</style>
</head>
<body>
<a href="playground/shape-layout.html" class="playground-link">Play with this code</a>

<p style="position: fixed; top: 20px; left: 20px;">Final Curve by Langston Hughes</p>

<!-- The stage holds the SVG guide and the four text blocks.
     contenteditable="true" lets you click and type on each block. -->
<div id="stage">
  <svg id="guide"></svg>
  <div class="block" contenteditable="true">When you turn the corner</div>
  <div class="block" contenteditable="true">And you run into yourself</div>
  <div class="block" contenteditable="true">Then you know that you have turned</div>
  <div class="block" contenteditable="true">All the corners that are left</div>
</div>

<!-- Changing this dropdown calls applyShape(), which repositions the blocks -->
<div id="controls">
  <select onchange="applyShape(this.value)">
    <option value="circle">Circle</option>
    <option value="rectangle">Rectangle</option>
    <option value="diagonal">Diagonal</option>
    <option value="wave">Wave</option>
  </select>
</div>

<script>
// Grab references to the elements we'll need throughout
const blocks = [...document.querySelectorAll('.block')]; // the four text blocks
const stage  = document.getElementById('stage');
const guide  = document.getElementById('guide');

// SVG elements need a special namespace when created with JavaScript
const ns   = 'http://www.w3.org/2000/svg';
// Shared style for all guide lines: gray, dashed, no fill
const dash = 'fill:none;stroke:#ccc;stroke-width:1;stroke-dasharray:5,5';


// ── getPositions ────────────────────────────────────────────────────────────
// Returns an array of [x, y] coordinates — one for each of the 4 blocks.
// w and h are the current width and height of the stage.
// The coordinates are calculated as fractions of w/h so the layout
// scales to any screen size.

function getPositions(shape) {
  const w = stage.offsetWidth;
  const h = stage.offsetHeight;

  if (shape === 'circle') {
    const cx = w / 2;                      // center x
    const cy = h / 2;                      // center y
    const r  = Math.min(w, h) * 0.32;     // radius = 32% of the smaller dimension
    // Place each block evenly around the circle using trigonometry.
    // The angle starts at -π/2 so the first block appears at the top.
    return [0, 1, 2, 3].map(i => {
      const angle = (i / 4) * Math.PI * 2 - Math.PI / 2;
      return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
    });
  }

  if (shape === 'rectangle') {
    // Four corners of a rectangle that has a 10% margin from the edges
    return [
      [w / 2,   h * 0.1],  // top center
      [w * 0.9, h / 2  ],  // right center
      [w / 2,   h * 0.9],  // bottom center
      [w * 0.1, h / 2  ]   // left center
    ];
  }

  if (shape === 'diagonal') {
    // Four evenly-spaced points along a top-left to bottom-right diagonal
    return [0, 1, 2, 3].map(i => [
      w * (0.12 + i * 0.25),
      h * (0.12 + i * 0.25)
    ]);
  }

  if (shape === 'wave') {
    const A = h * 0.22; // amplitude — how tall the wave is
    // Four points spread across the width, with y following a sine curve
    return [0, 1, 2, 3].map(i => [
      w * (0.12 + i * 0.25),
      h / 2 + A * Math.sin(i * Math.PI / 2)
    ]);
  }
}


// ── drawGuide ────────────────────────────────────────────────────────────────
// Draws a dashed SVG shape behind the text blocks so you can see the path.
// SVG (Scalable Vector Graphics) lets you draw shapes with code.
// Each shape type creates a different SVG element.

function drawGuide(shape) {
  guide.innerHTML = ''; // clear the previous guide shape
  const w = stage.offsetWidth;
  const h = stage.offsetHeight;

  if (shape === 'circle') {
    const el = document.createElementNS(ns, 'circle');
    el.setAttribute('cx', w / 2);
    el.setAttribute('cy', h / 2);
    el.setAttribute('r',  Math.min(w, h) * 0.32);
    el.setAttribute('style', dash);
    guide.appendChild(el);
  }

  if (shape === 'rectangle') {
    const el = document.createElementNS(ns, 'rect');
    el.setAttribute('x',      w * 0.1);
    el.setAttribute('y',      h * 0.1);
    el.setAttribute('width',  w * 0.8);
    el.setAttribute('height', h * 0.8);
    el.setAttribute('style', dash);
    guide.appendChild(el);
  }

  if (shape === 'diagonal') {
    const el = document.createElementNS(ns, 'line');
    el.setAttribute('x1', w * 0.12); el.setAttribute('y1', h * 0.12);
    el.setAttribute('x2', w * 0.87); el.setAttribute('y2', h * 0.87);
    el.setAttribute('style', dash);
    guide.appendChild(el);
  }

  if (shape === 'wave') {
    const A = h * 0.22;
    // Build a path by calculating 101 points along the wave curve
    // and connecting them with SVG "M" (move to) and "L" (line to) commands
    const pts = Array.from({length: 101}, (_, i) => {
      const t = i / 100; // t goes from 0 to 1 across the width
      const x = w * (0.12 + t * 0.75);
      const y = h / 2 + A * Math.sin(t * Math.PI * 1.5);
      return `${i === 0 ? 'M' : 'L'}${x},${y}`;
    }).join(' ');
    const el = document.createElementNS(ns, 'path');
    el.setAttribute('d', pts);
    el.setAttribute('style', dash);
    guide.appendChild(el);
  }
}


// ── applyShape ───────────────────────────────────────────────────────────────
// Called when you pick a shape from the dropdown.
// Gets the positions, moves each block, then draws the guide.

function applyShape(shape) {
  const pos = getPositions(shape);
  blocks.forEach((block, i) => {
    block.style.left = pos[i][0] + 'px';
    block.style.top  = pos[i][1] + 'px';
  });
  drawGuide(shape);
}

// Start with a circle when the page first loads
applyShape('circle');
</script>

</body>
</html>
